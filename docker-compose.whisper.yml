# Self-hosted Whisper STT server (optional — run on a VPS or locally with Docker)
# Start: docker compose -f docker-compose.whisper.yml up -d
# Then in .env.local: WHISPER_STT_ENDPOINT=http://127.0.0.1:8000/v1

services:
  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    ports:
      - "8000:8000"
    environment:
      WHISPER__MODEL: base
      WHISPER__INFERENCE_DEVICE: cpu
